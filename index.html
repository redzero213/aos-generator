<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOS 專業資料管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', 'PingFang HK', 'Microsoft JhengHei', sans-serif; }
        .copy-btn:active { transform: scale(0.95); }
        .scroll-custom::-webkit-scrollbar { height: 8px; width: 6px; }
        .scroll-custom::-webkit-scrollbar-track { background: #f1f1f1; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
        input:focus { border-color: #3b82f6; outline: none; ring: 2px; ring-color: #bfdbfe; }
        .edit-input { @apply w-full bg-white border border-blue-300 rounded px-1 py-0.5 text-xs focus:bg-blue-50; }
        .tool-link { @apply flex flex-col items-center justify-center gap-1 p-3 bg-white border rounded-xl hover:shadow-md transition text-sm font-medium text-gray-700; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-[1600px] mx-auto grid grid-cols-1 xl:grid-cols-4 gap-8 mb-8">
        
        <!-- 左側：生成器主體 -->
        <div class="xl:col-span-1 bg-white rounded-2xl shadow-xl p-6 h-fit sticky top-8 border border-gray-200">
            <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">🍎 AOS 資料生成</h1>
            
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase">姓 (Last Name)</label>
                        <div class="flex gap-1">
                            <input type="text" id="last_name" readonly class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-sm font-bold">
                            <button onclick="copyToClipboard('last_name')" class="copy-btn bg-gray-800 text-white px-2 rounded-lg text-[10px]">複製</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase">名 (First Name)</label>
                        <div class="flex gap-1">
                            <input type="text" id="first_name" readonly class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-sm font-bold">
                            <button onclick="copyToClipboard('first_name')" class="copy-btn bg-gray-800 text-white px-2 rounded-lg text-[10px]">複製</button>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase">電話</label>
                    <div class="flex gap-2">
                        <input type="text" id="phone" readonly class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-sm font-mono font-bold text-blue-600">
                        <button onclick="copyToClipboard('phone')" class="copy-btn bg-gray-800 text-white px-3 rounded-lg text-xs">複製</button>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase">Email</label>
                    <div class="flex gap-2">
                        <input type="text" id="email" readonly class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-sm font-mono text-gray-600">
                        <button onclick="copyToClipboard('email')" class="copy-btn bg-gray-800 text-white px-3 rounded-lg text-xs">複製</button>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase">地址 Line 1</label>
                    <div class="flex gap-2">
                        <input type="text" id="addr1" readonly class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-sm">
                        <button onclick="copyToClipboard('addr1')" class="copy-btn bg-gray-800 text-white px-3 rounded-lg text-xs">複製</button>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase">地址 Line 2</label>
                    <div class="flex gap-2">
                        <input type="text" id="addr2" readonly class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-sm">
                        <button onclick="copyToClipboard('addr2')" class="copy-btn bg-gray-800 text-white px-3 rounded-lg text-xs">複製</button>
                    </div>
                </div>

                <hr class="my-4 border-dashed border-gray-300">

                <div class="space-y-3 p-4 bg-blue-50 rounded-xl border border-blue-100">
                    <h3 class="text-sm font-bold text-blue-700 mb-1">📋 交易備註</h3>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] font-bold text-blue-400 uppercase">W 單號</label>
                            <input type="text" id="w_order" placeholder="W123..." class="w-full border border-blue-200 rounded-lg p-2 text-sm outline-none focus:bg-white">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-blue-400 uppercase">運單號</label>
                            <input type="text" id="tracking_no" placeholder="SF123..." class="w-full border border-blue-200 rounded-lg p-2 text-sm outline-none focus:bg-white">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] font-bold text-blue-400 uppercase">付款/備註</label>
                            <input type="text" id="card_info" placeholder="卡號末4位" class="w-full border border-blue-200 rounded-lg p-2 text-sm outline-none focus:bg-white">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-blue-400 uppercase">金額 (HKD)</label>
                            <input type="number" id="amount" placeholder="15999" class="w-full border border-blue-200 rounded-lg p-2 text-sm outline-none focus:bg-white">
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-2 pt-2">
                    <button onclick="generateAll()" class="w-full bg-black text-white font-bold py-3 rounded-xl hover:bg-gray-800 transition shadow-md">
                        🎲 隨機生成新資料
                    </button>
                    <button onclick="saveRecord()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition shadow-md">
                        📥 儲存完整紀錄
                    </button>
                </div>
            </div>
        </div>

        <!-- 右側：歷史紀錄 -->
        <div class="xl:col-span-3 bg-white rounded-2xl shadow-xl p-6 flex flex-col h-[850px] border border-gray-200">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-xl font-bold text-gray-800">📋 詳細落單紀錄</h2>
                    <p class="text-xs text-gray-400">所有歷史資料均保存在本地瀏覽器中</p>
                </div>
                <div class="flex gap-2">
                    <input type="file" id="csvFileInput" accept=".csv" class="hidden" onchange="importCSV(this)">
                    <button onclick="document.getElementById('csvFileInput').click()" class="text-xs bg-gray-100 text-gray-600 px-3 py-2 rounded-lg hover:bg-gray-200 transition border border-gray-200">匯入 CSV</button>
                    <button onclick="exportCSV()" class="text-xs bg-green-50 text-green-700 border border-green-200 px-3 py-2 rounded-lg hover:bg-green-100 transition">匯出 CSV</button>
                    <button onclick="clearAll()" class="text-xs bg-red-50 text-red-600 px-3 py-2 rounded-lg hover:bg-red-100 transition border border-red-100">清空</button>
                </div>
            </div>

            <div class="overflow-x-auto scroll-custom flex-grow border rounded-xl">
                <table class="w-full text-left border-collapse min-w-[1200px]">
                    <thead class="sticky top-0 bg-gray-50 shadow-sm z-10">
                        <tr class="text-[11px] font-bold text-gray-500 border-b uppercase">
                            <th class="p-3 w-40">訂單與運單</th>
                            <th class="p-3 w-32">姓名 (姓 / 名)</th>
                            <th class="p-3 w-48">聯絡資訊</th>
                            <th class="p-3">送貨地址</th>
                            <th class="p-3 w-28">付款與金額</th>
                            <th class="p-3 text-right w-24">操作</th>
                        </tr>
                    </thead>
                    <tbody id="recordList" class="text-sm text-gray-600">
                        <!-- 資料將由 JS 生成 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 底部快捷工具欄 (按鈕形式) -->
    <div class="max-w-[1600px] mx-auto">
        <p class="text-xs text-gray-400 mb-2 px-1 font-bold uppercase tracking-wider">快捷工具 (點擊自動複製目前電話 + 提示熱線)：</p>
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
            <button onclick="smartCopy('27300273', '順豐')" class="tool-link">
                <span class="text-xs text-gray-400 uppercase">SF Express</span>
                <span class="font-bold">📦 順豐熱線: 2730 0273</span>
            </button>
            <button onclick="smartCopy('27300273', '黑貓')" class="tool-link">
                <span class="text-xs text-gray-400 uppercase">Yamato</span>
                <span class="font-bold">🐈 黑貓熱線: 2730 0273</span>
            </button>
            <button onclick="smartCopy('24003388', 'DHL')" class="tool-link">
                <span class="text-xs text-gray-400 uppercase">DHL</span>
                <span class="font-bold">✈️ DHL 熱線: 2400 3388</span>
            </button>
            <button onclick="smartCopy('800908988', 'Apple支援')" class="tool-link bg-blue-50 border-blue-200">
                <span class="text-xs text-blue-400 uppercase">Apple Support</span>
                <span class="font-bold text-blue-600">🍎 Apple 熱線: 800-908-988</span>
            </button>
            <a href="https://www.apple.com/hk-zh/shop/order/list" target="_blank" class="tool-link bg-gray-800 text-white border-none">
                <span class="text-xs text-gray-400 uppercase">Official</span>
                <span class="font-bold text-white">🌐 Apple 官網追蹤</span>
            </a>
        </div>
    </div>

    <!-- 提示框 -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-2 rounded-full opacity-0 transition-all duration-300 pointer-events-none z-50 shadow-2xl text-sm border border-gray-700">已複製</div>

    <script>
        const STORAGE_KEY = 'aos_records_v4';
        let records = [];

        // 隨機資料庫 (保留專業版的多樣性)
        const firstNames = ["James", "Mary", "John", "Patricia", "Robert", "Jennifer", "Michael", "Linda", "William", "Elizabeth", "David", "Barbara", "Richard", "Susan", "Joseph"];
        const lastNames = ["Chan", "Lee", "Wong", "Ho", "Cheung", "Lau", "Lam", "Leung", "Ng", "Kwok", "Hui", "Tsang", "Chu", "Chow"];
        const bldgs = ["Kerry Centre", "Sino Centre", "Kornhill Gardens", "New Town Plaza", "Harbour City", "Telford Gardens", "Taikoo Shing", "Nan Fung Centre"];
        const streets = ["Nathan Road", "Hennessy Road", "Canton Road", "Des Voeux Road", "Argyle Street", "Queen's Road Central"];
        const districts = ["Mong Kok", "Tsim Sha Tsui", "Causeway Bay", "Central", "Kwun Tong", "Shatin", "Tsuen Wan", "Yuen Long"];
        const domains = ["gmail.com", "outlook.com", "yahoo.com.hk", "icloud.com"];

        function initStorage() {
            const data = localStorage.getItem(STORAGE_KEY);
            records = data ? JSON.parse(data) : [];
            renderRecords();
        }

        function generateAll() {
            document.getElementById('last_name').value = lastNames[Math.floor(Math.random() * lastNames.length)];
            document.getElementById('first_name').value = firstNames[Math.floor(Math.random() * firstNames.length)];
            
            const prefix = [2, 3, 5, 6, 9][Math.floor(Math.random() * 5)];
            let phone = prefix.toString();
            for(let i=0; i<7; i++) phone += Math.floor(Math.random() * 10);
            document.getElementById('phone').value = phone;
            
            const emailBase = document.getElementById('first_name').value.toLowerCase() + Math.floor(Math.random()*999);
            document.getElementById('email').value = `${emailBase}@${domains[Math.floor(Math.random() * domains.length)]}`;
            
            document.getElementById('addr1').value = `Unit ${Math.floor(Math.random()*20+1)}A, ${Math.floor(Math.random()*50+1)}/F, ${bldgs[Math.floor(Math.random()*bldgs.length)]}`;
            document.getElementById('addr2').value = `No. ${Math.floor(Math.random()*99+1)} ${streets[Math.floor(Math.random()*streets.length)]}, ${districts[Math.floor(Math.random()*districts.length)]}`;
            
            document.getElementById('w_order').value = "";
            document.getElementById('tracking_no').value = "";
            document.getElementById('card_info').value = "";
            document.getElementById('amount').value = "";
        }

        function saveRecord() {
            const lname = document.getElementById('last_name').value;
            if (!lname) return showToast("請先生成資料");

            const newRecord = {
                id: Date.now(),
                w_order: document.getElementById('w_order').value || '---',
                tracking_no: document.getElementById('tracking_no').value || '---',
                card: document.getElementById('card_info').value || '----',
                amount: document.getElementById('amount').value || '0',
                lname: lname,
                fname: document.getElementById('first_name').value,
                addr1: document.getElementById('addr1').value,
                addr2: document.getElementById('addr2').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                date: new Date().toLocaleString('zh-HK', {hour12:false})
            };

            records.unshift(newRecord);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            renderRecords();
            showToast("紀錄已儲存");
        }

        function renderRecords() {
            const list = document.getElementById('recordList');
            if (records.length === 0) {
                list.innerHTML = `<tr><td colspan="6" class="p-10 text-center text-gray-300 italic">暫無歷史紀錄</td></tr>`;
                return;
            }
            list.innerHTML = records.map(r => `
                <tr class="border-b hover:bg-gray-50 transition align-top">
                    <td class="p-3">
                        <div class="mb-1">
                            <span class="text-[10px] bg-blue-100 text-blue-600 px-1 rounded font-bold">W</span>
                            <span class="font-mono text-blue-600 font-bold ml-1">${r.w_order}</span>
                        </div>
                        <div>
                            <span class="text-[10px] bg-gray-100 text-gray-500 px-1 rounded font-bold">運單</span>
                            <span class="font-mono text-gray-800 ml-1 text-xs">${r.tracking_no}</span>
                        </div>
                    </td>
                    <td class="p-3">
                        <div class="font-bold text-gray-800 text-base">${r.lname} ${r.fname}</div>
                        <div class="text-[10px] text-gray-400 mt-1 uppercase">${r.lname} / ${r.fname}</div>
                    </td>
                    <td class="p-3 text-xs">
                        <div class="font-mono font-bold text-gray-700">${r.phone}</div>
                        <div class="text-gray-400 break-all">${r.email}</div>
                    </td>
                    <td class="p-3 text-[11px] text-gray-500 leading-tight">
                        <div class="bg-gray-50 p-2 rounded border border-gray-100">
                            ${r.addr1}<br>${r.addr2}
                        </div>
                    </td>
                    <td class="p-3">
                        <div class="text-green-600 font-bold">$${Number(r.amount).toLocaleString()}</div>
                        <div class="text-[9px] text-gray-400 mt-1">付款: ${r.card}</div>
                        <div class="text-[9px] text-gray-300">${r.date}</div>
                    </td>
                    <td class="p-3 text-right">
                        <button onclick="deleteRecord(${r.id})" class="text-red-300 hover:text-red-600 transition text-xs">刪除</button>
                    </td>
                </tr>
            `).join('');
        }

        // 核心邏輯：自動複製當前電話，然後彈出熱線號碼
        function smartCopy(hotline, label) {
            const currentPhone = document.getElementById('phone').value;
            
            // 複製到剪貼板
            const temp = document.createElement('textarea');
            temp.value = currentPhone;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            
            // 顯示提示
            showToast(`已複製收件人電話！${label}熱線：${hotline}`);
        }

        function copyToClipboard(id) {
            const input = document.getElementById(id);
            input.select();
            document.execCommand('copy');
            showToast("已複製內容");
        }

        function deleteRecord(id) {
            if(confirm("確定刪除此紀錄？")) {
                records = records.filter(r => r.id !== id);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
                renderRecords();
            }
        }

        function clearAll() {
            if(confirm("警告：這將永久刪除所有本地紀錄，確定嗎？")) {
                records = [];
                localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
                renderRecords();
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.opacity = '1';
            toast.style.bottom = '40px';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.bottom = '10px';
            }, 3000);
        }

        function exportCSV() {
            if (records.length === 0) return showToast("無資料可導出");
            let csv = "\uFEFFW單號,運單號,姓,名,電話,Email,地址1,地址2,付款,金額,日期\n";
            records.forEach(r => {
                csv += `"${r.w_order}","${r.tracking_no}","${r.lname}","${r.fname}","${r.phone}","${r.email}","${r.addr1}","${r.addr2}","${r.card}","${r.amount}","${r.date}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `AOS_Export_${new Date().getTime()}.csv`;
            link.click();
        }

        window.onload = () => {
            initStorage();
            generateAll();
        };
    </script>
</body>
</html>
